<!doctype html>

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keeley & Han — Photo Gallery</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* === Layout & Theme Sync === */
      body {
        margin: 0;
        font-family: "Georgia", serif;
        background: #faf9f7;
        color: #333;
        text-align: center;
      }
      header {
        padding: 40px 20px;
        background: white;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
      }
      h1,
      h2 {
        font-weight: 300;
        font-family: "Nanum Gothic", sans-serif;
        color: #c3a663;
      }
      .back-link {
        display: inline-block;
        margin-top: 15px;
        color: #888;
        text-decoration: none;
        font-family: "Nanum Gothic", sans-serif;
        font-size: 0.9rem;
      }
      .back-link:hover {
        color: #c3a663;
      }

      /* === Gateway Screen Styling === */
      #gatekeeper-screen {
        max-width: 400px;
        margin: 100px auto;
        padding: 40px 20px;
        background: white;
        border-radius: 6px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
      }
      input[type="password"] {
        width: 80%;
        padding: 12px;
        margin: 20px 0;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 1rem;
        text-align: center;
      }
      .submit-btn {
        padding: 12px 30px;
        background: #c3a663;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 1rem;
        transition: 0.3s;
      }
      .submit-btn:hover {
        background: #a88c52;
      }
      #error-msg {
        color: #d9534f;
        margin-top: 15px;
        font-family: "Nanum Gothic", sans-serif;
        display: none;
      }

      /* === Protected Gallery Grid === */
      #gallery-content {
        display: none;
        max-width: 1200px;
        margin: 40px auto;
        padding: 0 20px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
      }
      .grid-item {
        overflow: hidden;
        border-radius: 6px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.08);
        background: #fff;
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }
      .grid-item:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
      }
      .grid-item img {
        width: 100%;
        height: 260px;
        object-fit: cover;
        display: block;
      }

      @media (max-width: 768px) {
        .grid {
          grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
          gap: 10px;
        }
        .grid-item img {
          height: 150px;
        }
        #gatekeeper-screen {
          margin: 40px 15px;
        }
      }
    </style>
  </head>
